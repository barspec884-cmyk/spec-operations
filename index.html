<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>業務チェック｜Bar SPEC</title>

<style>
:root{
  --bg-open:#0e0c0a;
  --bg-close:#0b1020;
  --panel:#181512;
  --text:#f4ead7;
  --muted:#c9b89b;
  --amber:#d7b274;
  --blue:#7da7ff;
  --ok:#8fd19e;
  --ng:#ff8f8f;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP",sans-serif;
  background:var(--bg-open);
  color:var(--text);
  transition:background .3s;
}
body.close{background:var(--bg-close)}
header{
  padding:14px;
  text-align:center;
  font-weight:600;
  background:linear-gradient(#1c1814,#14110f);
  border-bottom:1px solid #ffffff22;
}
main{padding:16px}
.card{
  background:var(--panel);
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
}
h2{font-size:16px;margin:0 0 12px;color:var(--amber)}
h3{font-size:14px;margin:12px 0 6px;color:#e6d3a3}
label{display:block;margin:6px 0}
input[type="text"],input[type="number"],textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#000;
  color:var(--text);
}
textarea{resize:vertical}
button{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  font-size:16px;
  font-weight:600;
  background:var(--amber);
  color:#000;
}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{
  flex:1;
  padding:12px;
  text-align:center;
  border-radius:12px;
  font-weight:600;
  background:#000;
  color:var(--muted);
}
.tab.active.open{background:var(--amber);color:#000}
.tab.active.close{background:var(--blue);color:#000}
.note{font-size:13px;color:var(--muted);line-height:1.5}
#cashResult{font-weight:600;margin-top:8px}
.hidden{display:none}
</style>
</head>

<body>
<header>業務チェック</header>
<main>

<!-- 氏名 -->
<div class="card">
  <h2>担当者氏名（必須）</h2>
  <input id="name" type="text" placeholder="氏名を入力">
</div>

<!-- タブ -->
<div class="tabs">
  <div id="tabOpen" class="tab active open" onclick="setMode('開店')">開店</div>
  <div id="tabClose" class="tab close" onclick="setMode('閉店')">閉店</div>
</div>

<!-- 開店 -->
<div id="openSection" class="card">
  <h2>開店チェック</h2>

  <h3>2階</h3>
  <label><input type="checkbox" value="2階 トイレ（便器・個室・床・鏡・ゴミ箱）"> トイレ一式</label>
  <label><input type="checkbox" value="2階 テーブル"> テーブル</label>
  <label><input type="checkbox" value="2階 椅子"> 椅子</label>
  <label><input type="checkbox" value="2階 床"> 床</label>
  <label><input type="checkbox" value="2階 備品チェック"> 備品チェック</label>
  <label><input type="checkbox" value="2階 menu"> menu</label>

  <h3>1階</h3>
  <label><input type="checkbox" value="1階 床"> 床</label>
  <label><input type="checkbox" value="1階 カウンター"> カウンター</label>
  <label><input type="checkbox" value="1階 椅子"> 椅子</label>
  <label><input type="checkbox" value="1階 バックバー"> バックバー</label>
  <label><input type="checkbox" value="1階 キッチン"> キッチン</label>

  <h3>階段・エントランス</h3>
  <label><input type="checkbox" value="階段"> 階段</label>
  <label><input type="checkbox" value="エントランス"> エントランス</label>
  <label><input type="checkbox" value="取っ手周り"> 取っ手周り</label>

  <h3>レジ・在庫</h3>
  <label><input type="checkbox" value="レジ確認"> レジ確認</label>
  <label><input type="checkbox" value="在庫チェック"> 在庫チェック</label>
</div>

<!-- 閉店 -->
<div id="closeSection" class="card hidden">
  <h2>閉店チェック</h2>

  <label><input type="checkbox" value="レジ締確認"> レジ締確認</label>
  <label><input type="checkbox" value="3階 エアコン"> 3階 エアコン</label>
  <label><input type="checkbox" value="2階 エアコン"> 2階 エアコン</label>
  <label><input type="checkbox" value="1階 エアコン"> 1階 エアコン</label>
  <label><input type="checkbox" value="照明 消灯確認"> 照明 消灯</label>
  <label><input type="checkbox" value="食洗器"> 食洗器</label>
  <label><input type="checkbox" value="おしぼりウォーマー"> おしぼりウォーマー</label>
  <label><input type="checkbox" value="カーテン"> カーテン</label>
  <label><input type="checkbox" value="施錠"> 施錠</label>
</div>

<!-- 金種チェッカー（常時） -->
<div class="card">
  <h2>釣り銭チェック（合計3万円）</h2>

  <h3>紙幣</h3>
  <label>10,000円 × <input type="number" id="n10000" value="0"></label>
  <label>5,000円 × <input type="number" id="n5000" value="0"></label>
  <label>1,000円 × <input type="number" id="n1000" value="0"></label>

  <h3>硬貨</h3>
  <label>500円 × <input type="number" id="n500" value="0"></label>
  <label>100円 × <input type="number" id="n100" value="0"></label>
  <label>50円 × <input type="number" id="n50" value="0"></label>
  <label>10円 × <input type="number" id="n10" value="0"></label>
  <label>5円 × <input type="number" id="n5" value="0"></label>
  <label>1円 × <input type="number" id="n1" value="0"></label>

  <p id="cashResult"></p>
  <p class="note">
    ※ 合計3万円が最重要です。<br>
    ※ 金種は理想例がありますが多少異なっても問題ありません。
  </p>
</div>

<!-- コメント -->
<div class="card">
  <h2>コメント（差異がある場合は必須）</h2>
  <textarea id="comment" rows="3"></textarea>
</div>

<button onclick="sendMail()">報告を送信</button>

</main>

<script>
async function sendMail(){
  const name = document.getElementById('name').value.trim();
  if (!name) {
    alert('氏名を入力してください');
    return;
  }

  const ok = calcCash();
  const comment = document.getElementById('comment').value.trim();

  // 業務ルール（フロント側）
  if (mode === '開店' && !ok) {
    alert('開店時に釣り銭が合っていません。直ちに責任者へ連絡してください。');
    return;
  }
  if (mode === '閉店' && !ok && !comment) {
    alert('差異がある場合は理由を入力してください。');
    return;
  }

  const checks = [...document.querySelectorAll('input[type=checkbox]:checked')]
    .map(c => '・' + c.value)
    .join('\n');

  const payload = {
    mode,
    name,
    checks,
    cashText: document.getElementById('cashResult').textContent,
    comment
  };

  try {
    const res = await fetch('/api/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || '送信に失敗しました');
    }

    alert('報告が正常に送信されました。');
  } catch (err) {
    alert('送信エラー：' + err.message);
  }
}
</script>

</body>
</html>
