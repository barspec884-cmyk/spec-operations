<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>業務チェック｜Bar SPEC</title>
<style>
:root{--bg-open:#0e0c0a;--bg-close:#0b1020;--panel:#181512;--text:#f4ead7;--muted:#c9b89b;--amber:#d7b274;--blue:#7da7ff;--ok:#8fd19e;--ng:#ff8f8f;}
*{box-sizing:border-box}
body{margin:0;font-family:sans-serif;background:var(--bg-open);color:var(--text);transition:background .3s;}
body.close{background:var(--bg-close)}
header{padding:14px;text-align:center;font-weight:600;background:#1c1814;border-bottom:1px solid #ffffff22;}
main{padding:16px}
.card{background:var(--panel);border-radius:14px;padding:16px;margin-bottom:16px;}
h2{font-size:16px;margin:0 0 12px;color:var(--amber)}
h3{font-size:14px;margin:12px 0 6px;color:#e6d3a3}
label{display:block;margin:6px 0}
input[type="text"],input[type="number"],textarea{width:100%;padding:10px;border-radius:10px;border:none;background:#000;color:var(--text);}
button{width:100%;padding:14px;border-radius:14px;border:none;font-size:16px;font-weight:600;background:var(--amber);color:#000;cursor:pointer;}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;padding:12px;text-align:center;border-radius:12px;background:#000;color:var(--muted);cursor:pointer;}
.tab.active.open{background:var(--amber);color:#000}
.tab.active.close{background:var(--blue);color:#000}
.hidden{display:none}
#cashResult{font-weight:600;margin-top:8px}
</style>
</head>
<body>
<header>Bar SPEC 業務チェック</header>
<main>
  <div class="card">
    <h2>担当者氏名（必須）</h2>
    <input id="name" type="text" placeholder="氏名を入力">
  </div>
  <div class="tabs">
    <div id="tabOpen" class="tab active open" onclick="setMode('開店')">開店</div>
    <div id="tabClose" class="tab" onclick="setMode('閉店')">閉店</div>
  </div>
  <div id="openSection" class="card">
    <h2>開店チェック</h2>
    <label><input type="checkbox" value="2階清掃"> 2階清掃一式</label>
    <label><input type="checkbox" value="1階清掃"> 1階清掃一式</label>
    <label><input type="checkbox" value="エントランス"> 階段・エントランス</label>
    <label><input type="checkbox" value="レジ在庫確認"> レジ・在庫確認</label>
  </div>
  <div id="closeSection" class="card hidden">
    <h2>閉店チェック</h2>
    <label><input type="checkbox" value="レジ締"> レジ締確認</label>
    <label><input type="checkbox" value="全階エアコンOFF"> 全階エアコンOFF</label>
    <label><input type="checkbox" value="消灯・施錠"> 消灯・施錠</label>
  </div>
  <div class="card">
    <h2>釣り銭チェック（合計3万円）</h2>
    <label>10,000円 × <input type="number" id="n10000" value="0" oninput="calc()"></label>
    <label>5,000円 × <input type="number" id="n5000" value="0" oninput="calc()"></label>
    <label>1,000円 × <input type="number" id="n1000" value="0" oninput="calc()"></label>
    <label>500円以下（合計枚数ではなく金額を入力） <input type="number" id="others" value="0" oninput="calc()"></label>
    <p id="cashResult">合計：0 円</p>
  </div>
  <div class="card">
    <h2>コメント</h2>
    <textarea id="comment" rows="3"></textarea>
  </div>
  <button onclick="sendMail()">報告を送信</button>
</main>

<script>
let mode = '開店';
function setMode(m) {
  mode = m;
  document.getElementById('tabOpen').className = 'tab' + (m === '開店' ? ' active open' : '');
  document.getElementById('tabClose').className = 'tab' + (m === '閉店' ? ' active close' : '');
  document.getElementById('openSection').classList.toggle('hidden', m !== '開店');
  document.getElementById('closeSection').classList.toggle('hidden', m !== '閉店');
  document.body.className = (m === '閉店' ? 'close' : '');
}
function calc() {
  const t = (Number(document.getElementById('n10000').value)*10000) + 
            (Number(document.getElementById('n5000').value)*5000) + 
            (Number(document.getElementById('n1000').value)*1000) + 
            Number(document.getElementById('others').value);
  const isOk = (t === 30000);
  const res = document.getElementById('cashResult');
  res.textContent = `合計：${t.toLocaleString()} 円 ${isOk ? '（基準一致）' : '（不一致）'}`;
  res.style.color = isOk ? 'var(--ok)' : 'var(--ng)';
}
async function sendMail(){
  const name = document.getElementById('name').value.trim();
  if(!name) return alert('氏名を入力してください');
  const cashText = document.getElementById('cashResult').textContent;
  const comment = document.getElementById('comment').value;
  const checks = [...document.querySelectorAll(`#${mode==='開店'?'open':'close'}Section input:checked`)].map(c=>'・'+c.value).join('\n');
  
  const btn = document.querySelector('button');
  btn.disabled = true; btn.textContent = '送信中...';

  try {
    const res = await fetch('/api/report', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ mode, name, checks, cashText, comment })
    });
    const data = await res.json();
    if(res.ok) { alert('送信完了しました'); location.reload(); }
    else { alert('エラー: ' + data.error); }
  } catch(e) {
    alert('サーバーエラーが発生しました。Vercelの環境変数などを確認してください。');
  } finally {
    btn.disabled = false; btn.textContent = '報告を送信';
  }
}
</script>
</body>
</html>
