<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>業務チェック｜Bar SPEC</title>
<style>
:root{
  --bg-open:#0e0c0a;
  --bg-close:#0b1020;
  --panel:#181512;
  --text:#f4ead7;
  --muted:#c9b89b;
  --amber:#d7b274;
  --blue:#7da7ff;
  --ok:#8fd19e;
  --ng:#ff8f8f;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP",sans-serif;
  background:var(--bg-open);
  color:var(--text);
  transition:background .3s;
}
body.close{background:var(--bg-close)}
header{
  padding:14px;
  text-align:center;
  font-weight:600;
  background:linear-gradient(#1c1814,#14110f);
  border-bottom:1px solid #ffffff22;
}
main{padding:16px}
.card{
  background:var(--panel);
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
}
h2{font-size:16px;margin:0 0 12px;color:var(--amber)}
h3{font-size:14px;margin:12px 0 6px;color:#e6d3a3}
label{display:block;margin:6px 0}
input[type="text"],input[type="number"],textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#000;
  color:var(--text);
}
textarea{resize:vertical}
button{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  font-size:16px;
  font-weight:600;
  background:var(--amber);
  color:#000;
  cursor: pointer;
}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{
  flex:1;
  padding:12px;
  text-align:center;
  border-radius:12px;
  font-weight:600;
  background:#000;
  color:var(--muted);
  cursor: pointer;
}
.tab.active.open{background:var(--amber);color:#000}
.tab.active.close{background:var(--blue);color:#000}
.note{font-size:13px;color:var(--muted);line-height:1.5}
#cashResult{font-weight:600;margin-top:8px}
.hidden{display:none}
</style>
</head>
<body>
<header>業務チェック</header>
<main>

<div class="card">
  <h2>担当者氏名（必須）</h2>
  <input id="name" type="text" placeholder="氏名を入力">
</div>

<div class="tabs">
  <div id="tabOpen" class="tab active open" onclick="setMode('開店')">開店</div>
  <div id="tabClose" class="tab close" onclick="setMode('閉店')">閉店</div>
</div>

<div id="openSection" class="card">
  <h2>開店チェック</h2>
  <h3>2階</h3>
  <label><input type="checkbox" value="2階 トイレ"> トイレ一式</label>
  <label><input type="checkbox" value="2階 テーブル"> テーブル</label>
  <label><input type="checkbox" value="2階 椅子"> 椅子</label>
  <label><input type="checkbox" value="2階 床"> 床</label>
  <label><input type="checkbox" value="2階 備品チェック"> 備品チェック</label>
  <label><input type="checkbox" value="2階 menu"> menu</label>
  <h3>1階</h3>
  <label><input type="checkbox" value="1階 床"> 床</label>
  <label><input type="checkbox" value="1階 カウンター"> カウンター</label>
  <label><input type="checkbox" value="1階 椅子"> 椅子</label>
  <label><input type="checkbox" value="1階 バックバー"> バックバー</label>
  <label><input type="checkbox" value="1階 キッチン"> キッチン</label>
  <h3>階段・エントランス</h3>
  <label><input type="checkbox" value="階段"> 階段</label>
  <label><input type="checkbox" value="エントランス"> エントランス</label>
  <label><input type="checkbox" value="取っ手周り"> 取っ手周り</label>
  <h3>レジ・在庫</h3>
  <label><input type="checkbox" value="レジ確認"> レジ確認</label>
  <label><input type="checkbox" value="在庫チェック"> 在庫チェック</label>
</div>

<div id="closeSection" class="card hidden">
  <h2>閉店チェック</h2>
  <label><input type="checkbox" value="レジ締確認"> レジ締確認</label>
  <label><input type="checkbox" value="3階 エアコン"> 3階 エアコン</label>
  <label><input type="checkbox" value="2階 エアコン"> 2階 エアコン</label>
  <label><input type="checkbox" value="1階 エアコン"> 1階 エアコン</label>
  <label><input type="checkbox" value="照明 消灯確認"> 照明 消灯</label>
  <label><input type="checkbox" value="食洗器"> 食洗器</label>
  <label><input type="checkbox" value="おしぼりウォーマー"> おしぼりウォーマー</label>
  <label><input type="checkbox" value="カーテン"> カーテン</label>
  <label><input type="checkbox" value="施錠"> 施錠</label>
</div>

<div class="card">
  <h2>釣り銭チェック（合計3万円）</h2>
  <h3>紙幣</h3>
  <label>10,000円 × <input type="number" id="n10000" value="0" min="0"></label>
  <label>5,000円 × <input type="number" id="n5000" value="0" min="0"></label>
  <label>1,000円 × <input type="number" id="n1000" value="0" min="0"></label>
  <h3>硬貨</h3>
  <label>500円 × <input type="number" id="n500" value="0" min="0"></label>
  <label>100円 × <input type="number" id="n100" value="0" min="0"></label>
  <label>50円 × <input type="number" id="n50" value="0" min="0"></label>
  <label>10円 × <input type="number" id="n10" value="0" min="0"></label>
  <label>5円 × <input type="number" id="n5" value="0" min="0"></label>
  <label>1円 × <input type="number" id="n1" value="0" min="0"></label>
  <p id="cashResult">合計：0 円</p>
  <p class="note">※ 合計3万円が最重要です。</p>
</div>

<div class="card">
  <h2>コメント（差異がある場合は必須）</h2>
  <textarea id="comment" rows="3"></textarea>
</div>

<button onclick="sendMail()">報告を送信</button>
</main>

<script>
let mode = '開店';

function setMode(m) {
  mode = m;
  document.getElementById('tabOpen').className = 'tab' + (m === '開店' ? ' active open' : '');
  document.getElementById('tabClose').className = 'tab' + (m === '閉店' ? ' active close' : '');
  document.getElementById('openSection').classList.toggle('hidden', m !== '開店');
  document.getElementById('closeSection').classList.toggle('hidden', m !== '閉店');
  document.body.className = (m === '閉店' ? 'close' : '');
  calcCash();
}

function calcCash() {
  const ids = ['n10000','n5000','n1000','n500','n100','n50','n10','n5','n1'];
  const vals = [10000, 5000, 1000, 500, 100, 50, 10, 5, 1];
  let total = 0;
  ids.forEach((id, i) => {
    total += (parseInt(document.getElementById(id).value) || 0) * vals[i];
  });
  const isOk = (total === 30000);
  const status = isOk ? '（基準一致）' : '（不一致）';
  const resultEl = document.getElementById('cashResult');
  resultEl.textContent = `合計：${total.toLocaleString()} 円 ${status}`;
  resultEl.style.color = isOk ? 'var(--ok)' : 'var(--ng)';
}

document.querySelectorAll('input[type="number"]').forEach(el => {
  el.addEventListener('input', calcCash);
});

async function sendMail(){
  const name = document.getElementById('name').value.trim();
  if (!name) return alert('氏名を入力してください');

  const cashText = document.getElementById('cashResult').textContent;
  const comment = document.getElementById('comment').value.trim();
  const checks = [...document.querySelectorAll(`#${mode === '開店' ? 'open' : 'close'}Section input:checked`)]
    .map(c => '・' + c.value).join('\n');

  const btn = document.querySelector('button');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    const res = await fetch('/api/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode, name, checks, cashText, comment })
    });
    const data = await res.json();
    if (res.ok) {
      alert('報告を送信しました');
      location.reload();
    } else {
      throw new Error(data.error || '送信エラー');
    }
  } catch (err) {
    alert('エラー: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '報告を送信';
  }
}
</script>
</body>
</html>
